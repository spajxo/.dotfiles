font_family JetBrainsMono Nerd Font Mono
font_size 11.0

# Nerd Font symbol map
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b5,U+e700-U+e7c5,U+ed00-U+efc1,U+f000-U+f2ff,U+f300-U+f372,U+f400-U+f533,U+f0001-U+f1af0 JetBrainsMono Nerd Font Mono
tab_bar_edge top
tab_bar_style powerline
inactive_tab_foreground #ccc
inactive_tab_background #555
map ctrl+c copy_and_clear_or_interrupt
map ctrl+v paste_from_clipboard
map ctrl+shift+v send_key ctrl+shift+v
